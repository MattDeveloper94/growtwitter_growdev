<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>GrowTwitter - Login</title>
    <link rel="stylesheet" href="../../public/css/style.css">
    <link rel="stylesheet" href="../../public/css/index.css">
    <link rel="icon" href="../img/imagem_logo.svg">
    <script src="../../public/javascript/login.js"></script>
    <script src="../../public/javascript/pagetema.js"></script>
</head>

<body class="login-page">
    <main class="login-container">
        <section class="login-brand">
            <img src="../../public/img/imagem_logo.svg" alt="Logo GrowTwitter" class="logo-large">
        </section>

        <section class="login-form-section">
            <img src="../../public/img/titlegrowtwitter.svg" alt="nome logo GrowTwitter">
            <h2>Inscreva-se</h2>

            <form id="login-form">
                <input type="text" id="login" class="box-login" placeholder="Nome de usuário (@)" autocomplete="off"
                    required>
                <input type="password" id="password" class="box-senha" placeholder="Senha" autocomplete="off" required>
                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <p class="link">Ainda não tem conta?<a href="cadastro.html">Clique aqui</a></p>
        </section>

        <div id="tema-index">
            <button id="toggle-theme" class="btn-tema">botao-tema-mode</button>
        </div>
    </main>
</body>

</html>
