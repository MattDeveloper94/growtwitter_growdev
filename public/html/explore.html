<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowTwitter - Dev Edition</title>
    <link rel="stylesheet" href="../../public/css/style.css">
    <link rel="stylesheet" href="../../public/css/explore.css">
    <link rel="icon" href="../img/imagem_logo.svg">
    <script src="../../public/javascript/main.js"></script>
    <script src="../../public/javascript/pagetema.js"></script>
    <script src="../../public/javascript/explore.js"></script>
    <script src="../javascript/tweetsForm.js"></script>
</head>

<body>
    <div class="container">
        <aside class="sidebar">

            <div class="logo">
                <img src="../../public/img/logo_growtwitter.svg" alt="GrowTwitter Logo" class="logo_growtw">
            </div>
            <div class="nav-links">
                <div class="nav-item">🏠 Home</div>
                <div class="nav-item"><b>🔍 Explore</b></div>
                <div class="nav-item">🔔 Notifications</div>
                <div class="nav-item">👤 Profile</div>
            </div>
            <button id="btn-menu" class="btn-sair">Sair</button>

            <div class="user-account">
                <div class="avatar"></div>
                <div class="user-info">
                    <p class="user-name">Nome do Aluno</p>
                    <p class="user-handle">@dev_aluno</p>
                </div>
                <div class="user-more">...</div>
            </div>
        </aside>

        <main class="feed">
            <header class="timeline-header">
                <h2>Explore</h2>
            </header>
            <div id="tema-index">
                <button id="toggle-theme" class="btn-tema">botao-tema-mode</button>
            </div>

            <div class="tweet-box">
                <div class="avatar-placeholder"></div>
                <div class="input-container">
                    <textarea id="tweetContent" rows="1" placeholder="O que tá rolando?"></textarea>
                    <div class="tweet-actions">
                        <button type="submit" id="btnPostar" class="btn-postar">Post</button>
                    </div>
                </div>
                <span id="contador" rows="1">
                    
                </span>
            </div>

            <div id="feedList">

            </div>
        </main>

        <aside class="widgets">
            <div class="search-container">
                <input type="text" id="searchField" class="search-input" autocomplete="off"
                    placeholder="Busca GrowTwitter">
            </div>
            <div class="trending">
                <h3 id="title-trending">Tendências do momento:</h3>
                <div class="trend-item">
                    <span>Trending in Brazil</span>
                    <p>#NodeJS</p>
                </div>
                <div class="trend-item">
                    <span>Technology · Trending</span>
                    <p>#TypeScript</p>
                </div>
                <div class="trend-item">
                    <span>Open Source</span>
                    <p>#PrismaORM</p>
                </div>
            </div>
        </aside>
    </div>

</body>

</html>
