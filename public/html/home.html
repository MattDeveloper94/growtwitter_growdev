<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowTwitter - Home</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../img/imagem_logo.svg">
    <script src="../javascript/main.js"></script>
    <script src="../javascript/home.js"></script>
    <script src="../javascript/pagetema.js"></script>
    <script src="../javascript/tweetsForm.js"></script>
</head>

<body>
    <div class="container">
        <aside class="sidebar">

            <div class="logo">
                <img src="../img/logo_growtwitter.svg" alt="GrowTwitter Logo" class="logo_growtw">
            </div>
            <div class="nav-links">
                <div class="nav-item" data-page="home"><b>🏠 Home</b></div>
                <div class="nav-item" data-page="explore">🔍 Explore</div>
                <div class="nav-item" data-page="notifications">🔔 Notifications</div>
                <div class="nav-item" data-page="profile">👤 Profile</div>
            </div>
            <button id="btn-menu" class="btn-sair" data-page="logout">Sair</button>
            <div class="user-account">

                <div class="profile-dropdown">
                    <button id="btnUploadFoto">Img Perfil</button>
                    <button id="btnLogout">Logout</button>
                </div>

                <div class="account-front">
                    <div class="avatar avatar-usuario-logado"></div>

                    <div class="user-info">
                        <p class="user-name-logado"></p>
                        <span class="user-username-logado"></span>
                    </div>
                </div>

            </div>
        </aside>

        <div class="modal-foto" id="modalFoto">
            <div class="modal-content">
                <h3>Alterar foto de perfil</h3>
                <button id="btnEscolherFoto">
                    Escolher imagem
                </button>
                <button id="btnFecharModal">
                    Fechar
                </button>
            </div>
        </div>
        <input type="file" id="inputFoto" hidden accept="image/*">

        <main class="feed">
            <header class="timeline-header">
                <h2>Home</h2>
            </header>
            <div id="tema-index">
                <button id="toggle-theme" class="btn-tema"> </button>
            </div>
            <input type="file" id="inputFotoTweet" hidden accept="image/*">
            <div class="tweet-box">
                <div class="avatar avatar-usuario-logado"></div>
                <div class="input-container">
                    <textarea id="tweetContent" rows="1" placeholder="O que tá rolando?"></textarea>
                    <div id="previewFotoTweet"></div>
                    <div class="tweet-actions">
                        <button id="btnFotoTweet" title="upload image" type="button">
                            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                                <path
                                    d="M3 5.5A2.5 2.5 0 0 1 5.5 3h2.379a1.5 1.5 0 0 1 1.06.44l.621.62a1.5 1.5 0 0 0 1.06.44h3.758a1.5 1.5 0 0 0 1.06-.44l.621-.62A1.5 1.5 0 0 1 17.12 3H19.5A2.5 2.5 0 0 1 22 5.5v11A2.5 2.5 0 0 1 19.5 19h-14A2.5 2.5 0 0 1 3 16.5v-11ZM12 8a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Zm0 1.5a3 3 0 1 1 0 6 3 3 0 0 1 0-6Z" />
                            </svg>
                        </button>
                        <div>
                            <p id="contador">0/280</p>
                        </div>
                        <button type="submit" id="btnPostar" class="btn-postar">Post</button>
                    </div>
                </div>
            </div>

            <div id="feedList">

            </div>
        </main>

        <aside class="widgets">
            <div class="search-container">
                <input type="text" id="searchField" class="search-input" autocomplete="off"
                    placeholder="Busca GrowTwitter">
            </div>
            <div class="trending">
                <h3 id="title-trending">Tendências do momento:</h3>
                <div class="trend-item">
                    <span>Trending in Brazil</span>
                    <p>#NodeJS</p>
                </div>
                <div class="trend-item">
                    <span>Technology · Trending</span>
                    <p>#TypeScript</p>
                </div>
                <div class="trend-item">
                    <span>Open Source</span>
                    <p>#PrismaORM</p>
                </div>
            </div>
        </aside>
    </div>
    <footer class="feed-footer">
        <p>● GrowTwitter © 2026 - github.com/MattDeveloper94 ●</p>
    </footer>

</body>

</html>
